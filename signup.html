<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BuildTrack – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<style>
  .error {
    color: #EF4444;
    font-size: 12px;
    margin-bottom: 10px;
    text-align: center;
  }
  .success {
    color: #22C55E;
    font-size: 12px;
    margin-bottom: 10px;
    text-align: center;
    }

    .email-hint {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
    }
  
</style>
<body>

<!-- ── LEFT PANEL ── -->
<div class="panel-left">
  <div class="grid-lines"></div>

  <div class="brand">
    <div class="brand-icon">
      <!-- hard hat / crane icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 19H4v-1a7 7 0 0 1 7-7V4l6 3v3a7 7 0 0 1 4 6.33V19Zm-8-8a5 5 0 0 0-4.9 4h9.8A5 5 0 0 0 12 11Z"/>
      </svg>
    </div>
    <div class="brand-name">Build<span>Track</span></div>
    <div class="brand-tagline">Construction Project Management</div>
  </div>

  <div class="illustration">
    <div class="city-scene" style="position:relative;">
      <div class="building b1"></div>
      <div class="building b2"></div>
      <div class="building b3"></div>
      <div class="building b4"></div>
      <div class="building b5"></div>
      <div class="building b6"></div>

      <!-- crane overlay -->
      <div style="position:absolute;bottom:0;left:52%;transform:translateX(-50%);">
        <div style="position:relative;display:inline-block;">
          <div class="crane-tower">
            <div class="crane-arm">
              <div class="crane-counter"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="ground"></div>
  </div>

  <div class="stats-row">
    <div class="stat-badge">
      <div class="num">500+</div>
      <div class="lbl">Projects</div>
    </div>
    <div class="stat-badge">
      <div class="num">98%</div>
      <div class="lbl">On-time</div>
    </div>
    <div class="stat-badge">
      <div class="num">12K</div>
      <div class="lbl">Teams</div>
    </div>
  </div>
</div>

<!-- ── RIGHT PANEL ── -->
<div class="panel-right">
  <div class="form-card" style="max-width: 550px;">
    <h1>Create Account</h1>
    <p class="sub">Get started with your free account</p>
    <div class="divider"></div>

  
    <form action="" id="myForm">
    <div class="field">
        <label for="fullname">Full Name</label>
        <div class="input-wrap">
        <input type="text" id="fullname" placeholder="Enter your full name" autocomplete="name"/>
        </div>
    </div>


    <div class="field">
      <label for="email">Email Address</label>
      <div class="input-wrap">
        <input id="email" type="email" placeholder="Enter your email" autocomplete="email"/>
        <div class="email-hint" id="emailHint"></div>
      </div>
    </div>

   <div class="phone-company-wrap">
    <div class="field">
        <label for="phone">Phone Number</label>
        <div class="input-wrap">
            <input type="tel" id="phone" placeholder="Enter your phone number" autocomplete="tel"/>
        </div>
    </div>

    <div class="field">
        <label for="company">Company Name</label>
        <div class="input-wrap">
            <input type="text" id="company" placeholder="Enter company name" autocomplete="organization"/>
        </div>
    </div>

    </div>

        <div class="field">
          <label for="role" style="margin-bottom: 7px;">Role</label>
          <div class="input-wrap">
          <div class="select-wrap">
            <select id="role" style="margin-bottom: 0;">
              <option value="" disabled selected>Select Role</option>
               <option value="admin">Admin</option>
              <option value="worker">worker</option>
              <option value="project_manager">Project Manager</option>
              <option value="site_engineer">Site Engineer</option>
              <option value="contractor">Contractor</option>
              <option value="architect">Architect</option>
              <option value="safety_officer">Safety Officer</option>
              <option value="client">Client </option>
              <option value="other">Others</option>
            </select>
          </div>
          </div>
        </div>


    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input id="password" type="password" placeholder="Enter your password"/>
        <button class="toggle-pw" type="button" onclick="togglePw()" aria-label="Toggle password">
          <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    
    <div class="field">
          <label for="confirm">Confirm Password</label>
          <div class="input-wrap">
            <input type="password" id="confirm" placeholder="Confirm password" autocomplete="new-password"/>
            <button class="toggle-pw" type="button" aria-label="Toggle confirm password" onclick="togglePwd('confirm', this)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div id="message"></div>

    <button class="btn-login" type="button"  id="SignupBtn">Create Account</button>
    </form>

    <div class="register-row">
      Already have an account? <a href="login.html">Login</a> <br>
      <a href="admin/dashboard.html">continue with subsequent page</a>
    </div>
  </div>
</div>

<script>
  function togglePw() {
    const inp = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.innerHTML = `
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
        <line x1="1" y1="1" x2="23" y2="23"/>`;
    } else {
      inp.type = 'password';
      icon.innerHTML = `
        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
        <circle cx="12" cy="12" r="3"/>`;
    }
  }

  function togglePwd(id, btn) {
    const input = document.getElementById(id);
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.innerHTML = isHidden
      ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
      : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  }


</script>

<script src="js/data.js"></script>
<script src="js/signup.js"></script>
<script src="js/auth-check.js"></script>
</body>
</html>
