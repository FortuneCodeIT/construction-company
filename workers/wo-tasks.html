    <script>


        document.getElementById('DOMContentLoaded', () => {
            renderWorkerTasks();
            renderWorkerProject();
        });
     


  
        function updateTaskStatus(select, taskName) {
            const status = select.value;
            const taskCard = select.closest('.task-card');
            taskCard.setAttribute('data-status', status);
           
            // In a real app, you would send this to your backend
            console.log(`Task "${taskName}" updated to ${status}`);
           
            // Show confirmation
            const originalText = select.style.color;
            select.style.color = '#22C55E';
            setTimeout(() => {
                select.style.color = '';
            }, 500);
        }

        

        // Filter tasks
        document.getElementById('allTasksBtn').addEventListener('click', function() {
            showAllTasks();
            setActiveButton(this);
        });
       
        document.getElementById('pendingTasksBtn').addEventListener('click', function() {
            filterTasks('pending');
            setActiveButton(this);
        });
       
        document.getElementById('completedTasksBtn').addEventListener('click', function() {
            filterTasks('completed');
            setActiveButton(this);
        });
       
        function filterTasks(status) {
            const tasks = document.querySelectorAll('.task-card');
            tasks.forEach(task => {
                if (task.getAttribute('data-status') === status) {
                    task.style.display = 'block';
                } else {
                    task.style.display = 'none';
                }
            });
        }
       
        function showAllTasks() {
            const tasks = document.querySelectorAll('.task-card');
            tasks.forEach(task => {
                task.style.display = 'block';
            });
        }
       
        function setActiveButton(activeBtn) {
            const buttons = document.querySelectorAll('.projects-btn-wrapper button');
            buttons.forEach(btn => {
                btn.classList.remove('active-btn');
            });
            activeBtn.classList.add('active-btn');
        }
    </script>
