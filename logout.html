<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logging Out - Pinnacle</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
       
        body {
            font-family: 'DM Sans', sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
       
        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
       
        .bg-animation::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255, 82, 0, 0.15), transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.1), transparent 50%);
        }
       
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
        }
       
        /* Floating Shapes */
        .shape {
            position: absolute;
            background: rgba(255, 82, 0, 0.1);
            border-radius: 50%;
            filter: blur(60px);
            animation: float 20s infinite ease-in-out;
        }
       
        .shape-1 {
            width: 300px;
            height: 300px;
            top: -100px;
            left: -100px;
            background: rgba(255, 82, 0, 0.15);
            animation-delay: 0s;
        }
       
        .shape-2 {
            width: 400px;
            height: 400px;
            bottom: -150px;
            right: -150px;
            background: rgba(59, 130, 246, 0.1);
            animation-delay: 5s;
        }
       
        .shape-3 {
            width: 200px;
            height: 200px;
            top: 50%;
            left: 50%;
            background: rgba(34, 197, 94, 0.08);
            animation-delay: 10s;
            transform: translate(-50%, -50%);
        }
       
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
       
        /* Logout Card */
        .logout-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            margin: 20px;
        }
       
        .logout-card {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 48px 40px;
            text-align: center;
            border: 1px solid rgba(255, 82, 0, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }
       
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
       
        /* Icon */
        .logout-icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 82, 0, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            animation: pulse 2s infinite;
        }
       
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
       
        .logout-icon svg {
            width: 40px;
            height: 40px;
        }
       
        /* Text */
        .logout-card h1 {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 12px;
        }
       
        .logout-card p {
            color: #9a9a9a;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 32px;
        }
       
        /* User Info Display */
        .user-info {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
       
        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF5200, #ff8c5a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: #fff;
        }
       
        .user-details {
            text-align: left;
        }
       
        .user-name {
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }
       
        .user-role {
            font-size: 12px;
            color: #FF5200;
        }
       
        /* Progress Bar */
        .progress-container {
            margin-bottom: 32px;
        }
       
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #9a9a9a;
            margin-bottom: 8px;
        }
       
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
        }
       
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FF5200, #ff8c5a);
            width: 0%;
            border-radius: 4px;
            transition: width 2s ease;
        }
       
        /* Buttons */
        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
        }
       
        .btn-logout {
            background: #FF5200;
            border: none;
            padding: 14px 32px;
            border-radius: 40px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 15px;
        }
       
        .btn-logout:hover {
            background: #e04a00;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(255, 82, 0, 0.3);
        }
       
        .btn-cancel {
            background: transparent;
            border: 1px solid #2a2a2a;
            padding: 14px 32px;
            border-radius: 40px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 15px;
        }
       
        .btn-cancel:hover {
            border-color: #FF5200;
            color: #FF5200;
        }
       
        /* Redirect Message */
        .redirect-message {
            margin-top: 24px;
            font-size: 13px;
            color: #6b6b6b;
        }
       
        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
       
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
       
        /* Hidden Class */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
   
    <div class="bg-animation">
        <div class="grid-overlay"></div>
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
   
    <div class="logout-container">
        <div class="logout-card">
            <div class="logout-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 3H19C20.1 3 21 3.9 21 5V19C21 20.1 20.1 21 19 21H15" stroke="#FF5200" stroke-width="2" stroke-linecap="round"/>
                    <path d="M10 17L15 12L10 7" stroke="#FF5200" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M15 12H3" stroke="#FF5200" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
           
            <h1>Leaving So Soon?</h1>
            <p>You are about to be logged out of your account. Your session will be securely terminated.</p>
           
            <div class="user-info" id="userInfo">
                <div class="user-avatar" id="userAvatar">JD</div>
                <div class="user-details">
                    <div class="user-name" id="userName">John Doe</div>
                    <div class="user-role" id="userRole">Admin</div>
                </div>
            </div>
           
            <div class="progress-container">
                <div class="progress-text">
                    <span>Logging out</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
           
            <div class="button-group" id="actionButtons">
                <button class="btn-cancel" onclick="cancelLogout()">Cancel</button>
                <button class="btn-logout" onclick="confirmLogout()">Yes, Logout</button>
            </div>
           
            <div class="redirect-message hidden" id="redirectMessage">
                <span class="spinner"></span>
                Redirecting to homepage...
            </div>
        </div>
    </div>
   
    <script>
        // Get user data from sessionStorage (set during login)
        let userData = {
            name: 'Guest',
            role: 'guest',
            avatar: 'GU',
            dashboardPath: '../index.html'
        };
       
        // Try to load user data from sessionStorage
        try {
            const storedUser = sessionStorage.getItem('pinnacle_user');
            if (storedUser) {
                const parsed = JSON.parse(storedUser);
                userData.name = parsed.name || 'User';
                userData.role = parsed.role || 'guest';
                userData.avatar = parsed.avatar || (parsed.name ? parsed.name.substring(0, 2).toUpperCase() : 'US');
            }
        } catch(e) {
            console.log('No user session found');
        }
       
        // Update UI with user data
        document.getElementById('userName').textContent = userData.name;
        document.getElementById('userRole').textContent = formatRole(userData.role);
        document.getElementById('userAvatar').textContent = userData.avatar;
       
        function formatRole(role) {
            const roleMap = {
                'admin': 'Administrator',
                'project_manager': 'Project Manager',
                'engineer': 'Engineer',
                'supervisor': 'Supervisor',
                'worker': 'Worker',
                'client': 'Client',
                'guest': 'Guest'
            };
            return roleMap[role] || role.charAt(0).toUpperCase() + role.slice(1);
        }
       
        let logoutTimeout;
        let progressInterval;
        let progress = 0;
       
        function confirmLogout() {
            // Hide buttons, show progress
            document.getElementById('actionButtons').classList.add('hidden');
            document.querySelector('.progress-container').classList.remove('hidden');
           
            // Start progress animation
            progressInterval = setInterval(() => {
                progress += 2;
                if (progress >= 100) {
                    clearInterval(progressInterval);
                    progress = 100;
                    document.getElementById('progressFill').style.width = '100%';
                    document.getElementById('progressPercent').textContent = '100%';
                    completeLogout();
                } else {
                    document.getElementById('progressFill').style.width = progress + '%';
                    document.getElementById('progressPercent').textContent = progress + '%';
                }
            }, 30);
        }
       
        function cancelLogout() {
            // Go back to previous page
            window.history.back();
        }
       
        function completeLogout() {
            // Clear session storage
            sessionStorage.removeItem('pinnacle_user');
            sessionStorage.removeItem('pinnacle_token');
            sessionStorage.removeItem('pinnacle_role');
           
            // Clear local storage if any
            localStorage.removeItem('pinnacle_remember');
           
            // Show redirect message
            document.getElementById('redirectMessage').classList.remove('hidden');
           
            // Redirect to login page after short delay
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
        }
       
        // Auto-logout if this page was reached via logout link (skip confirmation)
        const urlParams = new URLSearchParams(window.location.search);
        const auto = urlParams.get('auto');
       
        if (auto === 'true') {
            // Auto logout without confirmation
            setTimeout(() => {
                confirmLogout();
            }, 500);
        }
       
        // Prevent accidental navigation
        window.addEventListener('beforeunload', function(e) {
            if (progress < 100 && progress > 0) {
                e.preventDefault();
                e.returnValue = 'Logout in progress. Are you sure you want to leave?';
            }
        });
    </script>

<script src="js/data.js"></script>
</body>
</html>
